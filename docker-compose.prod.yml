services:
  engine:
    environment:
      CRITIC_SAME_AS_MAIN: "false"
      CRITIC_PROVIDER: groq
      CRITIC_MODEL: openai/gpt-oss-120b
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
  api:
    environment:
      NODE_ENV: production
      ALLOW_MENTOR_REGISTRATION: "false"
      ALLOW_LOCAL_PROVIDER: "false"
